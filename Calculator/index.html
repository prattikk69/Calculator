<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
</head>
<body>
    <div class="container">
        <div class="display">
            <div class="userInput">0</div>
            <div class="brand">Z-Axis</div>
            <div class="answer"></div>
        </div>
        <div class="keys">
            <div class="numKeys">
                <span class="09 keyStyle nums" onclick="appOnDisplay('9')">9</span>
                <span class="08 keyStyle nums" onclick="appOnDisplay('8')">8</span>
                <span class="07 keyStyle nums" onclick="appOnDisplay('7')">7</span>
                <span class="06 keyStyle nums" onclick="appOnDisplay('6')">6</span>
                <span class="05 keyStyle nums" onclick="appOnDisplay('5')">5</span>
                <span class="04 keyStyle nums" onclick="appOnDisplay('4')">4</span>
                <span class="03 keyStyle nums" onclick="appOnDisplay('3')">3</span>
                <span class="02 keyStyle nums" onclick="appOnDisplay('2')">2</span>
                <span class="01 keyStyle nums" onclick="appOnDisplay('1')">1</span>
                <span class="0. keyStyle nums" onclick="appOnDisplay('.')">.</span>
                <span class="00 keyStyle nums" onclick="appOnDisplay('0')">0</span>
                <span class="0% keyStyle nums" onclick="appOnDisplay('%')">%</span>
            </div>
            <div class="signKeys">
                <span onclick="clearDisplay()" class="ac keyStyle sign">AC</span>
                <span onclick="correction()" class="back keyStyle sign">&larr;</span>
                <span onclick="appOnDisplay('+')" class="add keyStyle sign">+</span>
                <span onclick="appOnDisplay('-')" class="minus keyStyle sign">-</span>
                <span onclick="appOnDisplay('/')" class="divide keyStyle sign">&divide;</span>
                <span onclick="appOnDisplay('*')" class="multiply keyStyle sign">x</span>
                <span onclick="appOnDisplay('²')" class="multiply keyStyle sign">²</span>
                <span onclick="calculateValue()" class="equals keyStyle sign"> =</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
